server:
  port: 8090

spring:
#  docker:
#    compose:
#      enabled: true
#      file: 11.spring-rag/docker-compose.yml
  ai:
    model:
      embedding: openai
    embedding:
      transformer:
        onnx:
          model-uri: classpath:models/model.onnx
#          gpu-device-id: 0
        tokenizer:
          uri: classpath:models/tokenizer.json
    vectorstore:
      qdrant:
        host: localhost
        port: 6334
        collection-name: mi_coleccion_rag
    openai:
      api-key:  ${API_KEY}
      base-url: https://api.groq.com/openai/v1
      chat:
        options:
          model: llama-3.3-70b-versatile
      embedding:
        enabled: false
    mcp:
      client:
        stdio:
          servers-configuration: classpath:mcp-server.json

logging:
  level:
    org.springframework.ai.chat.client.advisor.SimpleLoggerAdvisor: DEBUG
